<!DOCTYPE html>
<html>
<head>
    <title>Booking Form</title>
</head>
<body>
    <h1>{% if booking %}Update Booking{% else %}Create Booking{% endif %}</h1>
    <form method="POST">
        {% csrf_token %}
        <label>Name:</label><input type="text" name="customer_name" value="{{ booking.customer_name|default:'' }}"><br>
        <label>Venue:</label><input type="text" name="venue" value="{{ booking.venue|default:'' }}"><br>
        <label>Date:</label><input type="date" name="date" value="{{ booking.date|default:'' }}"><br>
        <label>Time:</label><input type="time" name="time" value="{{ booking.time|default:'' }}"><br>
        <label>Guests:</label><input type="number" name="guests" value="{{ booking.guests|default:'' }}"><br>
        <button type="submit">Save</button>
    </form>
    <a href="{% url 'booking_list' %}">Back to list</a>
</body>
</html>
