
<!DOCTYPE html>
<html>
<head>
    <title>Booking List</title>
</head>
<body>
    <h1>All Bookings</h1>
    <a href="{% url 'booking_create' %}">Create New Booking</a>
    <ul>
        {% for booking in bookings %}
            <li>
                {{ booking.customer_name }} - {{ booking.venue }} ({{ booking.date }} {{ booking.time }})
                <a href="{% url 'booking_update' booking.id %}">Edit</a>
                <a href="{% url 'booking_delete' booking.id %}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
